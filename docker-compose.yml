version: '3.8'

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meeting_booking_web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      - DB_HOST=database
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=meeting_booking_db
      - APP_URL=http://localhost:8080
    depends_on:
      - database

  database:
    image: mysql:8.0
    container_name: meeting_booking_db
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: meeting_booking_db
    volumes:
      - db_data:/var/lib/mysql
      # สคริปต์ DB จะถูกรันอัตโนมัติเมื่อสร้าง Database ครั้งแรก
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: meeting_booking_pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: database
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - database

volumes:
  db_data:
